name: Train ML Model

on:
  push:
    branches: [main]
    paths:
      - 'ml/**'
      - 'requirements.txt'
      - '.github/workflows/train.yml'
  workflow_dispatch:

jobs:
  train:
    name: ML 모델 학습 및 MLflow 업로드
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.13 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ML 모델 학습 실행
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          ALLOW_MLFLOW_FALLBACK: "false"
          RUN_SOURCE: "github-actions"
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python -m ml.train --model-type rf --n-estimators 150 --max-depth 8 --data-path ml/data/train_v2.csv --run-name rf-v2-tuned-ci

      - name: 학습 모델 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-files
          path: ml/artifacts/
          retention-days: 7
