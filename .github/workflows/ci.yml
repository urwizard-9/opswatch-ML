name: OpsWatch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 코드 품질 + 테스트 + 커버리지
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.13 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ruff 코드 품질 검사
        run: ruff check app/ tests/ ml/

      - name: pytest + 커버리지
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70
